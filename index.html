    <!-- Photo Modal -->
    <div id="photoModal" class="photo-modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <img id="modalImage" src="" alt="">
        </div>
    </div>

    <script>
        // Photo modal functionality
        function openPhotoModal(imageSrc) {
            const modal = document.getElementById('photoModal');
            const modalImg = document.getElementById('modalImage');
            
            modalImg.src = imageSrc;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Prevent scrolling
        }

        function closePhotoModal() {
            const modal = document.getElementById('photoModal');
            modal.style.display = 'none';
            document.body.style.overflow = 'auto'; // Restore scrolling
        }

        // Close modal when clicking the X
        document.querySelector('.close-modal').addEventListener('click', closePhotoModal);

        // Close modal when clicking outside the image
        document.getElementById('photoModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closePhotoModal();
            }
        });

        // Close modal with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closePhotoModal();
            }
        });

        // Update photo click handlers
        function openPhotoDetail(element) {
            // Get the clicked element and find the image source
            const photoElement = element.currentTarget || element;
            const imgSrc = photoElement.querySelector('img').src;
            openPhotoModal(imgSrc);
        }

        // Add click event listeners to all photos
        document.addEventListener('DOMContentLoaded', function() {
            const photoElements = document.querySelectorAll('.highlight-square');
            photoElements.forEach(element => {
                element.addEventListener('click', function(e) {
                    e.preventDefault();
                    const imgSrc = this.querySelector('img').src;
                    openPhotoModal(imgSrc);
                });
            });
        });
    </script>
